apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:1.60 # Explicitly use a modern stable version
        env:
        - name: COLLECTOR_OTLP_ENABLED
          value: "true"
        - name: COLLECTOR_OTLP_GRPC_HOST
          value: "0.0.0.0"
        # This helps the UI handle internal routing and layout calculations
        - name: QUERY_BASE_PATH
          value: "/"
        ports:
        - containerPort: 16686 # UI
        - containerPort: 4317  # OTLP gRPC
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
spec:
  type: NodePort
  selector:
    app: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
      nodePort: 30006
    - name: otlp
      port: 4317
      targetPort: 4317